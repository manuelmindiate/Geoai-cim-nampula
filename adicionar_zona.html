<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Zona</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
        body{margin:0;background:#f4f7fb;color:#1f2937}
        .topbar{background:linear-gradient(90deg,#0f4c81,#1677b3);color:white;padding:22px 30px}
        .container{width:95%;max-width:1100px;margin:30px auto}
        .menu{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:25px}
        .menu a{text-decoration:none;background:#0f4c81;color:white;padding:10px 16px;border-radius:10px;font-weight:bold}
        .box{background:white;border-radius:14px;padding:25px;box-shadow:0 4px 14px rgba(0,0,0,0.08)}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
        .field label{display:block;font-weight:bold;margin-bottom:7px}
        .field input,.field textarea{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
        .full{grid-column:1 / -1}
        .btn{margin-top:20px;background:#0f4c81;color:white;border:none;padding:12px 18px;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer}
        .note{margin-top:18px;background:#eff6ff;border-left:5px solid #1677b3;padding:14px;border-radius:10px}
    </style>
</head>
<body>
    <div class="topbar"><h1>Adicionar Zona Urbana</h1></div>
    <div class="container">
        <div class="menu">
            <a href="/">🏠 Início</a>
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/mapa">🗺️ Ver Mapa</a>
        </div>

        <div class="box">
            <form method="POST">
                <div class="form-grid">
                    <div class="field">
                        <label>Nome da zona</label>
                        <input type="text" name="nome" required>
                    </div>
                    <div class="field">
                        <label>Crescimento populacional</label>
                        <input type="number" step="0.1" name="crescimento_populacional" required>
                    </div>
                    <div class="field">
                        <label>Novas construções</label>
                        <input type="number" step="0.1" name="novas_construcoes" required>
                    </div>
                    <div class="field">
                        <label>Infraestruturas disponíveis</label>
                        <input type="number" step="0.1" name="infraestruturas" required>
                    </div>
                    <div class="field">
                        <label>Ocupação do solo</label>
                        <input type="number" step="0.1" name="ocupacao_solo" required>
                    </div>
                    <div class="field full">
                        <label>Polígono da zona (JSON)</label>
                        <textarea name="poligono" rows="6" placeholder='[[-15.116,39.266],[-15.116,39.276],[-15.126,39.276],[-15.126,39.266]]'></textarea>
                    </div>
                </div>

                <button type="submit" class="btn">Guardar Zona</button>
            </form>

            <div class="note">
                No polígono, escreve os pontos no formato:
                <strong>[[lat, lon], [lat, lon], [lat, lon], [lat, lon]]</strong>
            </div>
        </div>
    </div>
</body>
</html>
